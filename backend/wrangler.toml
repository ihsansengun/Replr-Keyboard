name = "replr-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
FREE_DAILY_LIMIT = "200"
# Anonymous (no session token) requests are rate-limited per IP at this daily cap.
# 120 (not lower) because carrier NAT pools many phones behind one IP — old-build
# TestFlight testers (pre-sign-in) share this quota with whoever shares their IP.
ANON_DAILY_LIMIT = "120"
# Server-managed users are metered by their credit balance (every request costs
# purchased credits), so this is only a runaway-loop circuit breaker.
MANAGED_DAILY_LIMIT = "1000"
# Flip to "true" once old un-authenticated clients are negligible — /reply then 401s anonymous traffic.
REQUIRE_AUTH = "false"
# StoreKit sandbox transactions are accepted while TestFlight is the audience. Set "false" at public launch.
ALLOW_SANDBOX_TRANSACTIONS = "true"
# Back Tap shortcut iCloud link. Change here + `npm run deploy` to update every
# user's "Add shortcut" button — no App Store release needed.
SHORTCUT_INSTALL_URL = "https://www.icloud.com/shortcuts/73472454024d4a48b1d2a9108fec4bc8"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "4bdb1c9ad31f40dda0898c86b8472234"

[[d1_databases]]
binding = "DB"
database_name = "replr-db"
database_id = "f4fedcd5-292a-4263-9c95-e89add4ae058"

[[routes]]
pattern = "api.replr.app/*"
zone_name = "replr.app"
